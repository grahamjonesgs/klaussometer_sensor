[env:nodemcu-32s]
platform = espressif32@3.5.0
board = nodemcu-32s
framework = arduino
lib_deps =
	adafruit/DHT sensor library@^1.4.6
	arduino-libraries/ArduinoMqttClient@^0.1.8
	fu-hsi/PMS Library@^1.1.0
	sensirion/Sensirion I2C SCD4x@^1.1.0
	sensirion/Sensirion I2C SHT4x@^1.1.0
	crankyoldgit/IRremoteESP8266@2.8.4

; ESP32-C6 target (FireBeetle 2) — requires pioarduino platform:
;   platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;   board = dfrobot_firebeetle2_esp32c6
; Also remove analogSetWidth() call in sensors.cpp (not in ESP32 Arduino core 3.x)
